<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Controle - Dot Battle</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#050816;
    font-family:Arial;
    color:white;

    height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:25px;
}

h1{
    color:cyan;
    font-size:38px;

    text-shadow:
    0 0 10px cyan,
    0 0 20px cyan,
    0 0 40px cyan;
}

.status{
    font-size:20px;
    opacity:0.8;
}

.controls{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:18px;
}

.middle{
    display:flex;
    gap:18px;
}

.btn{

    width:95px;
    height:95px;

    border:none;
    border-radius:22px;

    font-size:42px;
    font-weight:bold;

    color:white;

    background:linear-gradient(
        145deg,
        #00cfff,
        #0066ff
    );

    box-shadow:
    0 0 10px #00cfff,
    0 0 25px #0099ff,
    0 0 50px #0066ff;

    transition:0.15s;

    user-select:none;
}

.btn:active{

    transform:scale(0.92);

    box-shadow:
    0 0 5px #00cfff,
    0 0 15px #0099ff;
}

</style>
</head>
<body>

<div class="container">

    <h1>DOT BATTLE</h1>

    <div class="status">
        Controle conectado
    </div>

    <div class="controls">

        <button class="btn" id="up">
            ↑
        </button>

        <div class="middle">

            <button class="btn" id="left">
                ←
            </button>

            <button class="btn" id="right">
                →
            </button>

        </div>

        <button class="btn" id="down">
            ↓
        </button>

    </div>

</div>

<script src="/socket.io/socket.io.js"></script>

<script>

const socket = io();

socket.emit("joinGame");

function mover(dir){

    socket.emit("move", dir);

}

document.getElementById("up")
.addEventListener("touchstart", () => mover("up"));

document.getElementById("down")
.addEventListener("touchstart", () => mover("down"));

document.getElementById("left")
.addEventListener("touchstart", () => mover("left"));

document.getElementById("right")
.addEventListener("touchstart", () => mover("right"));

</script>

</body>
</html>
