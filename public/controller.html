<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Controle - Dot Battle</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#050816;
    font-family:Arial;
    color:white;

    height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:25px;
}

h1{
    color:cyan;
    font-size:38px;

    text-shadow:
    0 0 10px cyan,
    0 0 20px cyan,
    0 0 40px cyan;
}

.status{
    font-size:20px;
    opacity:0.8;
}

.status{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:12px;

    font-size:20px;
    opacity:0.9;
}

.player-icon{
    width:60px;
    height:60px;

    object-fit:contain;

    filter:
    drop-shadow(0 0 5px white)
    drop-shadow(0 0 15px cyan);
}

.controls{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:18px;
}

.middle{
    display:flex;
    gap:18px;
}

.btn{

    width:95px;
    height:95px;

    border:none;
    border-radius:22px;

    font-size:42px;
    font-weight:bold;

    color:white;

    background:linear-gradient(
        145deg,
        #00cfff,
        #0066ff
    );

    box-shadow:
    0 0 10px #00cfff,
    0 0 25px #0099ff,
    0 0 50px #0066ff;

    transition:0.15s;

    user-select:none;
}

.btn:active{

    transform:scale(0.92);

    box-shadow:
    0 0 5px #00cfff,
    0 0 15px #0099ff;
}

</style>
</head>
<body>

<div class="container">

    <h1>DOT BATTLE</h1>

    <div class="status" id="status">
    Controle conectado
    </div>
	
	
	

<div id="controle" style="display:none;">

    <!-- seus botões atuais -->

</div>




   <div class="controls">

    <button class="btn" id="up">
        ↑
    </button>

    <div class="middle">

        <button class="btn" id="left">
            ←
        </button>

        <button class="btn" id="down">
            ↓
        </button>

        <button class="btn" id="right">
            →
        </button>

    </div>

</div>



<script src="/socket.io/socket.io.js"></script>

<script>


const socket = io();

const nickname = localStorage.getItem("nickname");

if(!nickname){
    window.location = "/nickname";
}

socket.emit("joinGame", nickname);

let meuNumero = 0;
let intervalo = null;



// COMEÇAR MOVIMENTO

function iniciarMovimento(dir){

    pararMovimento();

    socket.emit("move", dir);

    intervalo = setInterval(() => {

        socket.emit("move", dir);

    }, 40);

}

// PARAR MOVIMENTO

function pararMovimento(){

    clearInterval(intervalo);

}


// BOTÕES

const up = document.getElementById("up");
const down = document.getElementById("down");
const left = document.getElementById("left");
const right = document.getElementById("right");


// TOUCH START

up.addEventListener("touchstart", (e) => {
    e.preventDefault();
    iniciarMovimento("up");
});

down.addEventListener("touchstart", (e) => {
    e.preventDefault();
    iniciarMovimento("down");
});

left.addEventListener("touchstart", (e) => {
    e.preventDefault();
    iniciarMovimento("left");
});

right.addEventListener("touchstart", (e) => {
    e.preventDefault();
    iniciarMovimento("right");
});


// TOUCH END

up.addEventListener("touchend", pararMovimento);
down.addEventListener("touchend", pararMovimento);
left.addEventListener("touchend", pararMovimento);
right.addEventListener("touchend", pararMovimento);


// EVITA BUG AO ARRASTAR O DEDO

document.addEventListener("touchend", pararMovimento);

const status = document.getElementById("status");

socket.on("meuNumero", (numero) => {

meuNumero = numero;

    if(numero === 1){

        status.innerHTML = `
        <img src="img/p1.png" class="player-icon">
        <span>VOCÊ É O JOGADOR AZUL</span>
        `;
    }

    if(numero === 2){

        status.innerHTML = `
        <img src="img/p2.png" class="player-icon">
        <span>VOCÊ É O JOGADOR VERMELHO</span>
        `;
    }

    if(numero === 3){

        status.innerHTML = `
        <img src="img/p3.png" class="player-icon">
        <span>VOCÊ É O JOGADOR VERDE</span>
        `;
    }

    if(numero === 4){

        status.innerHTML = `
        <img src="img/p4.png" class="player-icon">
        <span>VOCÊ É O JOGADOR AMARELO</span>
        `;
    }

});



</script>
