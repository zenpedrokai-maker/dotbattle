<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Controle - Dot Battle</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    font-family:Arial;
    color:white;

    display:flex;
    justify-content:center;
    align-items:center;

    /* 🔵🟣 fundo igual nickname */
    background: radial-gradient(circle at center,
        #12002b 0%,
        #05010a 60%,
        #000 100%);
}

/* container geral */
.container{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:25px;

    animation: fadeIn 0.4s ease;
}

/* título */
h1{
    font-size:40px;

    color:#7c3aed;

    text-shadow:
        0 0 10px #3b82f6,
        0 0 20px #7c3aed,
        0 0 40px rgba(124,58,237,0.6);
}

/* status */
.status{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:12px;

    font-size:18px;
    opacity:0.9;

    padding:10px 18px;

    border-radius:12px;

    background:rgba(10,10,20,0.6);

    border:1px solid rgba(124,58,237,0.4);

    box-shadow:
        0 0 10px rgba(59,130,246,0.2),
        0 0 20px rgba(124,58,237,0.2);
}

/* ícone do player */
.player-icon{
    width:60px;
    height:60px;

    object-fit:contain;

    filter:
        drop-shadow(0 0 5px #3b82f6)
        drop-shadow(0 0 15px #7c3aed);
}

/* controles */
.controls{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:18px;
}

.middle{
    display:flex;
    gap:18px;
}

/* BOTÕES NEON ROXO/AZUL */
.btn{
    width:95px;
    height:95px;

    border:none;
    border-radius:22px;

    font-size:42px;
    font-weight:bold;

    color:white;

    background:linear-gradient(
        145deg,
        #3b82f6,
        #7c3aed
    );

    box-shadow:
        0 0 10px #3b82f6,
        0 0 25px #7c3aed,
        0 0 50px rgba(124,58,237,0.4);

    transition:0.15s;

    user-select:none;
}

/* efeito clique */
.btn:active{
    transform:scale(0.92);

    box-shadow:
        0 0 5px #3b82f6,
        0 0 15px #7c3aed;
}

/* animação entrada */
@keyframes fadeIn{
    from{
        opacity:0;
        transform:scale(1.1);
        filter:blur(10px);
    }
    to{
        opacity:1;
        transform:scale(1);
        filter:blur(0);
    }
}

</style>
</head>
<body>

<div class="container">

    <h1>DOT BATTLE</h1>

    <div class="status" id="status">
    Controle conectado
    </div>
	
	
	

<div id="controle" style="display:none;">

    <!-- seus botões atuais -->

</div>




   <div class="controls">

    <button class="btn" id="up">
        ↑
    </button>

    <div class="middle">

        <button class="btn" id="left">
            ←
        </button>

        <button class="btn" id="down">
            ↓
        </button>

        <button class="btn" id="right">
            →
        </button>

    </div>

</div>



<script src="/socket.io/socket.io.js"></script>

<script>


const socket = io();

const nickname = localStorage.getItem("nickname");

if(!nickname){
    window.location = "/nickname";
}

socket.emit("joinGame", nickname);

let meuNumero = 0;
let intervalo = null;



// COMEÇAR MOVIMENTO

function iniciarMovimento(dir){

    pararMovimento();

    socket.emit("move", dir);

    intervalo = setInterval(() => {

        socket.emit("move", dir);

    }, 40);

}

// PARAR MOVIMENTO

function pararMovimento(){

    clearInterval(intervalo);

}


// BOTÕES

const up = document.getElementById("up");
const down = document.getElementById("down");
const left = document.getElementById("left");
const right = document.getElementById("right");


// TOUCH START

up.addEventListener("touchstart", (e) => {
    e.preventDefault();
    iniciarMovimento("up");
});

down.addEventListener("touchstart", (e) => {
    e.preventDefault();
    iniciarMovimento("down");
});

left.addEventListener("touchstart", (e) => {
    e.preventDefault();
    iniciarMovimento("left");
});

right.addEventListener("touchstart", (e) => {
    e.preventDefault();
    iniciarMovimento("right");
});


// TOUCH END

up.addEventListener("touchend", pararMovimento);
down.addEventListener("touchend", pararMovimento);
left.addEventListener("touchend", pararMovimento);
right.addEventListener("touchend", pararMovimento);


// EVITA BUG AO ARRASTAR O DEDO

document.addEventListener("touchend", pararMovimento);

const status = document.getElementById("status");

socket.on("meuNumero", (numero) => {

meuNumero = numero;

    if(numero === 1){

        status.innerHTML = `
        <img src="img/p1.png" class="player-icon">
        <span>VOCÊ É O JOGADOR AZUL</span>
        `;
    }

    if(numero === 2){

        status.innerHTML = `
        <img src="img/p2.png" class="player-icon">
        <span>VOCÊ É O JOGADOR VERMELHO</span>
        `;
    }

    if(numero === 3){

        status.innerHTML = `
        <img src="img/p3.png" class="player-icon">
        <span>VOCÊ É O JOGADOR VERDE</span>
        `;
    }

    if(numero === 4){

        status.innerHTML = `
        <img src="img/p4.png" class="player-icon">
        <span>VOCÊ É O JOGADOR AMARELO</span>
        `;
    }

});



</script>
