<!DOCTYPE html>

<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Dot Battle</title>

  <link rel="stylesheet" href="style.css">
</head>


<body>

  <div class="hud">
    <h1>DOT BATTLE</h1>

    <div class="placar">
      <div class="player-score azul">Azul: <span id="score1">0</span></div>
      <div class="player-score vermelho">Vermelho: <span id="score2">0</span></div>
      <div class="player-score verde">Verde: <span id="score3">0</span></div>
      <div class="player-score amarelo">Amarelo: <span id="score4">0</span></div>
    </div>
  </div>


  <div id="game">

    <div class="player azul" id="player1"></div>
    <div class="player vermelho" id="player2"></div>
    <div class="player verde" id="player3"></div>
    <div class="player amarelo" id="player4"></div>


   <!-- TOPO -->

<div class="wall horizontal" style="left:230px; top:80px;"></div>
<div class="wall horizontal" style="left:700px; top:80px;"></div>


<!-- MEIO SUPERIOR -->

<div class="wall vertical" style="left:130px; top:140px;"></div>
<div class="wall vertical" style="left:580px; top:140px;"></div>
<div class="wall vertical" style="left:1030px; top:140px;"></div>


<!-- CENTRO -->

<div class="wall horizontal" style="left:230px; top:260px;"></div>
<div class="wall horizontal" style="left:700px; top:260px;"></div>




<!-- PARTE BAIXA -->

<div class="wall horizontal" style="left:230px; top:470px;"></div>
<div class="wall horizontal" style="left:700px; top:470px;"></div>



  </div>

<div id="ranking"></div>

<script src="/socket.io/socket.io.js"></script>
<script src="ranking.js"></script>
<script src="script.js"></script>
<script src="steal.js"></script>

<audio id="musicaJogo" loop>
    <source src="audio/musica.mp3" type="audio/mpeg">
</audio>

</body>
</html>
