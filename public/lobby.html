<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Lobby - Dot Battle</title>

<style>

body{

    margin:0;

    background:
    radial-gradient(circle at center,
    #0a0f2c,
    #050816,
    #000);

    color:white;

    font-family:Arial;

    display:flex;

    justify-content:center;

    align-items:center;

    height:100vh;

    overflow:hidden;
}

/* GIF DE FUNDO */

body::before{

    content:"";

    position:fixed;

    top:0;
    left:0;

    width:100%;
    height:100%;

    background:url("cyber.gif");

    background-size:cover;

    background-position:center;

    opacity:.15;

    z-index:-1;
}

.box{

    width:700px;

    text-align:center;

    padding:40px;

    background:rgba(0,20,50,.75);

    border:3px solid #00cfff;

    border-radius:25px;

    backdrop-filter:blur(10px);

    box-shadow:
    0 0 10px #00cfff,
    0 0 25px #00cfff,
    0 0 50px #0099ff,
    inset 0 0 20px rgba(0,200,255,.3);
}

h1{

    font-size:70px;

    font-weight:bold;

    color:#00cfff;

    letter-spacing:6px;

    text-transform:uppercase;

    text-shadow:
    0 0 5px #00cfff,
    0 0 10px #00cfff,
    0 0 20px #00cfff,
    0 0 40px #0099ff,
    0 0 80px #0066ff;

    margin-bottom:20px;
}

h2{

    font-weight:normal;
}

img{

    width:320px;

    margin:25px 0;

    border:3px solid cyan;

    border-radius:20px;

    box-shadow:
    0 0 15px cyan,
    0 0 40px cyan;
}

#players{

    font-size:32px;

    color:#00ff88;

    text-shadow:
    0 0 10px #00ff88;
}

button{

    margin-top:20px;

    padding:18px 60px;

    font-size:28px;

    font-weight:bold;

    color:white;

    border:none;

    border-radius:15px;

    cursor:pointer;

    background:
    linear-gradient(
    90deg,
    #00cfff,
    #0066ff
    );

    box-shadow:
    0 0 15px #00cfff,
    0 0 30px #0099ff;

    transition:.2s;
}

button:hover{

    transform:scale(1.05);
}

button:disabled{

    opacity:.4;

    cursor:not-allowed;
}

</style>
</head>
<body>


<audio autoplay loop>
    <source src="lobby.mp3" type="audio/mpeg">
</audio>




<div class="box">

    <h1>DOT BATTLE</h1>

    <h2>Leia o QR Code</h2>

    <img id="qrcode">

    <h2 id="players">0/4 jogadores</h2>

    <button id="startBtn" disabled>
        INICIAR
    </button>

</div>

<script src="/socket.io/socket.io.js"></script>

<script>

const socket = io();

const musica = document.querySelector("audio");

musica.volume = 0.15;

fetch("/qrcode")
.then(res => res.text())
.then(data => {

    document.getElementById("qrcode").src = data;

});

socket.on("playerCount", (count) => {

    document.getElementById("players").innerText =
        count + "/4 jogadores";

    if(count >= 1){

        document.getElementById("startBtn").disabled = false;
    }
});

document.getElementById("startBtn")
.addEventListener("click", () => {

 window.location.href = "/game";

});

</script>

</body>
</html>
