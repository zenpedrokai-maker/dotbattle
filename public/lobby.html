<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Lobby - Dot Battle</title>

<style>

body{

    margin:0;

    background:
    radial-gradient(circle at center,
        #12002b,
        #050816,
        #000);

    color:white;

    font-family:Arial;

    display:flex;
    justify-content:center;
    align-items:center;

    height:100vh;

    overflow:hidden;
}

/* fundo animado */
body::before{

    content:"";

    position:fixed;
    top:0;
    left:0;

    width:100%;
    height:100%;

    background:url("cyber.gif");
    background-size:cover;
    background-position:center;

    opacity:.12;
    z-index:-1;
}

/* caixa principal */
.box{

    width:700px;

    text-align:center;

    padding:40px;

    background:rgba(10,10,25,.75);

    border:2px solid #7c3aed; /* roxo suave */

    border-radius:25px;

    backdrop-filter:blur(10px);

    box-shadow:
        0 0 10px #3b82f6,
        0 0 25px #7c3aed,
        0 0 50px rgba(124,58,237,.3),
        inset 0 0 20px rgba(59,130,246,.2);
}

/* título */
h1{

    font-size:70px;

    font-weight:bold;

    color:#7c3aed;

    letter-spacing:6px;

    text-transform:uppercase;

    text-shadow:
        0 0 5px #3b82f6,
        0 0 10px #7c3aed,
        0 0 20px #7c3aed,
        0 0 40px #3b82f6,
        0 0 80px rgba(124,58,237,.5);

    margin-bottom:20px;
}

h2{
    font-weight:normal;
}

/* QR code */
img{

    width:320px;

    margin:25px 0;

    border:2px solid #3b82f6;

    border-radius:20px;

    box-shadow:
        0 0 15px #3b82f6,
        0 0 40px #7c3aed;
}

/* 🟢 PLAYERS agora verde neon */
#players{

    font-size:32px;

    color:#00ff88;

    text-shadow:
        0 0 10px #00ff88,
        0 0 20px rgba(0,255,136,.5);
}

/* botão (NÃO MEXIDO como pediu) */
button{

    margin-top:20px;

    padding:18px 60px;

    font-size:28px;

    font-weight:bold;

    color:white;

    border:none;

    border-radius:15px;

    cursor:pointer;

    background:
    linear-gradient(
        90deg,
        #00cfff,
        #0066ff
    );

    box-shadow:
        0 0 15px #00cfff,
        0 0 30px #0099ff;

    transition:.2s;
}

button:hover{
    transform:scale(1.05);
}

button:disabled{
    opacity:.4;
    cursor:not-allowed;
}

/* logo */
.logo{
    position:absolute;
    top:20px;
    left:20px;

    width:120px;

    box-shadow:none;
    filter:none;
    border:none;
}

</style>
</head>
<body>

<img src="img/logo.png" class="logo">


<audio autoplay loop>
    <source src="lobby.mp3" type="audio/mpeg">
</audio>




<div class="box">

    <h1>DOT BATTLE</h1>

    <h2>Leia o QR Code</h2>

    <img id="qrcode">

    <h2 id="players">0/4 jogadores</h2>

    <button id="startBtn" disabled>
        INICIAR
    </button>

</div>

<script src="/socket.io/socket.io.js"></script>

<script>

const socket = io();

const musica = document.querySelector("audio");

musica.volume = 0.15;

fetch("/qrcode")
.then(res => res.text())
.then(data => {

    document.getElementById("qrcode").src = data;

});

socket.on("playerCount", (count) => {

    document.getElementById("players").innerText =
        count + "/4 jogadores";

    if(count >= 1){

        document.getElementById("startBtn").disabled = false;
    }
});

document.getElementById("startBtn")
.addEventListener("click", () => {

 window.location.href = "/game";

});

</script>

</body>
</html>
