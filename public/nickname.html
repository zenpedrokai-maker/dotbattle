<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Digite seu nome</title>

<style>
body{
    margin:0;
    height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    font-family: Arial;

    /* fundo azul-roxo */
    background: radial-gradient(circle at center,
        #12002b 0%,
        #05010a 60%,
        #000 100%);
}

/* INPUT estilo neon roxo-azul */
input{
    padding:18px 20px;
    font-size:20px;
    border-radius:12px;

    border:2px solid #7c3aed; /* roxo */
    outline:none;

    background:#0b001a;
    color:white;

    text-align:center;

    box-shadow:
        0 0 10px #3b82f6,
        0 0 20px #7c3aed,
        0 0 40px rgba(124,58,237,0.4);

    transition:0.25s;
}

/* foco mais forte */
input:focus{
    transform:scale(1.05);

    border-color:#3b82f6;

    box-shadow:
        0 0 15px #3b82f6,
        0 0 30px #7c3aed,
        0 0 60px rgba(59,130,246,0.5);
}

/* placeholder mais suave */
input::placeholder{
    color:#8b8b8b;
}

/* entrada suave na tela */
body{
    animation: fadeIn 0.4s ease;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:scale(1.1);
        filter:blur(10px);
    }
    to{
        opacity:1;
        transform:scale(1);
        filter:blur(0);
    }
}
</style>

</head>
<body>

<input
id="nickname"
placeholder="Seu nickname..."
maxlength="12"
/>

<script>

const input =
document.getElementById("nickname");

input.focus();

input.addEventListener("keydown", e=>{

    if(e.key === "Enter"){

        const nome = input.value.trim();

        if(nome.length < 2) return;

        localStorage.setItem(
            "nickname",
            nome
        );

        window.location =
        "/controller";
    }

});

</script>

</body>
</html>
